apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: clawith
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: clawith-backend:latest
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          value: "postgresql+asyncpg://clawith:$(POSTGRES_PASSWORD)@postgres:5432/clawith"
        - name: REDIS_URL
          value: "redis://redis:6379/0"
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: clawith-secrets
              key: SECRET_KEY
        - name: JWT_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: clawith-secrets
              key: JWT_SECRET_KEY
        - name: CORS_ORIGINS
          valueFrom:
            configMapKeyRef:
              name: clawith-config
              key: CORS_ORIGINS
        - name: AGENT_DATA_DIR
          value: "/data/agents"
        - name: AGENT_TEMPLATE_DIR
          value: "/app/agent_template"
        volumeMounts:
        - name: agent-data
          mountPath: /data/agents
        - name: docker-sock
          mountPath: /var/run/docker.sock
        readinessProbe:
          httpGet:
            path: /api/health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /api/health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 20
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
      volumes:
      - name: agent-data
        persistentVolumeClaim:
          claimName: agent-data-pvc
      - name: docker-sock
        hostPath:
          path: /var/run/docker.sock
          type: Socket
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: agent-data-pvc
  namespace: clawith
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 5Gi