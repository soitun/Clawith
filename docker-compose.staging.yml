version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-clawith}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-clawith}
      POSTGRES_DB: ${POSTGRES_DB:-clawith_staging}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - pgdata_staging:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-clawith}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    # Limit resources for staging
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata_staging:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    # Limit resources for staging
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
        reservations:
          memory: 64M
          cpus: '0.1'

  backend:
    image: ${BACKEND_IMAGE:-clawith-backend:staging}
    restart: unless-stopped
    command: ["/bin/bash", "/app/entrypoint.sh"]
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://clawith:clawith@postgres:5432/clawith_staging}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      AGENT_DATA_DIR: /data/agents
      AGENT_TEMPLATE_DIR: /app/agent_template
      SECRET_KEY: ${SECRET_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS:-'["https://staging.yourdomain.com"]'}
      FEISHU_APP_ID: ${FEISHU_APP_ID:-}
      FEISHU_APP_SECRET: ${FEISHU_APP_SECRET:-}
      DOCKER_NETWORK: clawith_network
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      SS_CONFIG_FILE: /data/ss-nodes.json
    volumes:
      - agent_data_staging:/data/agents
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Limit resources for staging
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  frontend:
    image: ${FRONTEND_IMAGE:-clawith-frontend:staging}
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL:-https://api-staging.yourdomain.com}
    depends_on:
      - backend
    # Limit resources for staging
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
        reservations:
          memory: 64M
          cpus: '0.1'
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  pgdata_staging:
    driver: local
  redisdata_staging:
    driver: local
  agent_data_staging:
    driver: local

networks:
  default:
    name: clawith_staging_network
    driver: bridge