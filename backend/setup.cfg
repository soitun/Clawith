[tool:pytest]
testpaths = tests
python_files = tests/*.py test_*.py *_test.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts =
    -ra
    --strict-markers
    --strict-config
    -v
    --cov=app
    --cov-report=html
    --cov-report=term-missing

[coverage:run]
source = app/
omit =
    */venv/*
    */tests/*
    app/main.py
    app/database.py
    app/core/logging_config.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.: